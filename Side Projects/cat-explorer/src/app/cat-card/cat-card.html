<div class="cat-card">
  <img [src]="cat().url" [alt]="'Cat ' + cat().id" />

  <div class="info">
    <p><strong>ID:</strong> {{ cat().id }}</p>
    <p><strong>Size:</strong> {{ cat().width }} x {{ cat().height }}</p>

    @if (cat().breeds.length > 0) {
      <p><strong>Breed:</strong> {{ cat().breeds[0].name }}</p>
    } @else {
      <p><strong>Breed:</strong> Mixed / Unknown</p>
    }
  </div>
</div>
